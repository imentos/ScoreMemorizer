name: ScoreMemorizer
options:
  bundleIdPrefix: rkuo
  deploymentTarget:
    iOS: "18.0"
settings:
  base:
    DEVELOPMENT_TEAM: FC7C97FJWX
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "6.0"
targets:
  ScoreMemorizer:
    type: application
    platform: iOS
    sources:
      - path: ScoreMemorizer/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: rkuo.ScoreMemorizer
        INFOPLIST_KEY_CFBundleDisplayName: ScoreMemorizer
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        INFOPLIST_KEY_NSMicrophoneUsageDescription: ScoreMemorizer listens for piano sound activity during Freeze and Go drills.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: ScoreMemorizer/Info.plist
      properties:
        UIRequiresFullScreen: true
        UILaunchScreen: {}
        NSMicrophoneUsageDescription: ScoreMemorizer listens for piano sound activity during Freeze and Go drills.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait

